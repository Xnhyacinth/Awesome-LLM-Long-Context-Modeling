name: PR Check

on:
  pull_request:
    branches:
      - main

jobs:
  markdown-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Markdown Linter
        run: npm install -g markdownlint-cli

      - name: Run MarkdownLint
        run: markdownlint README.md || true

  link-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Check Links
        uses: lycheeverse/lychee-action@v1
        with:
          args: |
            --verbose
            --no-progress
            --timeout 60
            --max-retries 3
            --accept 200,201,204,206,301,302,307,308
            README.md
          fail: false

  awesome-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install awesome-lint
        run: npm install -g awesome-lint

      - name: Run awesome-lint
        run: awesome-lint README.md || true

  duplicate-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Check for Duplicate Entries (Excluding News Section)
        run: |
          # 找到 "## 📜 Papers" 章节的起始行号
          papers_section=$(grep -n "^## 📜 Papers" README.md | head -1 | cut -d: -f1)
          
          has_warnings=false
          
          if [ -n "$papers_section" ]; then
            # 只检查 Papers 章节及之后的内容，排除 News 部分
            tail -n +"$papers_section" README.md > readme_body.txt
            
            # 检查正文部分的 arXiv 重复
            grep -oE 'https://arxiv\.org/abs/[0-9.]+' readme_body.txt | sort > arxiv_links.txt
            arxiv_duplicates=$(uniq -d arxiv_links.txt)
            if [ -n "$arxiv_duplicates" ]; then
              echo "⚠️ Warning: Found duplicate arXiv entries in main content (may be intentional cross-category references):"
              echo "$arxiv_duplicates"
              has_warnings=true
            else
              echo "✅ No duplicate arXiv entries found in main content (excluding News)"
            fi

            # 检查正文部分的 GitHub 重复
            grep -oE 'https://github\.com/[^/]+/[^/)]+' readme_body.txt | sort > github_links.txt
            github_duplicates=$(uniq -d github_links.txt)
            if [ -n "$github_duplicates" ]; then
              echo "⚠️ Warning: Found duplicate GitHub entries in main content (may be intentional cross-category references):"
              echo "$github_duplicates"
              has_warnings=true
            else
              echo "✅ No duplicate GitHub entries found in main content (excluding News)"
            fi
          else
            echo "⚠️ Could not find '## 📜 Papers' section, checking entire file"
            grep -oE 'https://arxiv\.org/abs/[0-9.]+' README.md | sort > arxiv_links.txt
            arxiv_duplicates=$(uniq -d arxiv_links.txt)
            if [ -n "$arxiv_duplicates" ]; then
              echo "⚠️ Warning: Found duplicate arXiv entries:"
              echo "$arxiv_duplicates"
              has_warnings=true
            else
              echo "✅ No duplicate arXiv entries found"
            fi
          fi
          
          # 以成功状态退出，但记录警告
          if [ "$has_warnings" = true ]; then
            echo ""
            echo "ℹ️ Duplicate check completed with warnings (duplicates may be intentional)"
          fi
          exit 0

  date-format-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Check Date Format
        run: |
          # 检查 News 部分的日期格式是否为 YYYY.MM.DD
          if grep -nE '^\s*-\s*\*\*\[[0-9]{4}\.[0-9]{2}\.[0-9]{2}\]\*\*' README.md > dates.txt; then
            echo "✅ Date format check passed"
          else
            echo "⚠️ No date entries found or format mismatch"
          fi

  yaml-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install yamllint
        run: pip install yamllint

      - name: Lint YAML files
        run: |
          find . -name "*.yml" -o -name "*.yaml" | grep -v node_modules | while read file; do
            echo "Checking $file"
            yamllint -d relaxed "$file" || true
          done

  json-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Check JSON files
        run: |
          find . -name "*.json" | grep -v node_modules | while read file; do
            echo "Checking $file"
            python3 -m json.tool "$file" > /dev/null && echo "✅ $file is valid JSON" || echo "❌ $file is invalid JSON"
          done

  trailing-whitespace-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Check Trailing Whitespace
        run: |
          if grep -rI '[[:space:]]$' --include="*.md" --include="*.yml" --include="*.yaml" --include="*.json" .; then
            echo "❌ Found trailing whitespace"
            exit 1
          fi
          echo "✅ No trailing whitespace found"

  pr-summary:
    runs-on: ubuntu-latest
    needs: [markdown-lint, link-check, awesome-lint, duplicate-check, date-format-check, yaml-lint, json-lint, trailing-whitespace-check]
    if: always()
    steps:
      - name: PR Check Summary
        run: |
          echo "## PR Check Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Markdown Lint | ${{ needs.markdown-lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Link Check | ${{ needs.link-check.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Awesome Lint | ${{ needs.awesome-lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Duplicate Check | ${{ needs.duplicate-check.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Date Format Check | ${{ needs.date-format-check.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| YAML Lint | ${{ needs.yaml-lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| JSON Lint | ${{ needs.json-lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Trailing Whitespace | ${{ needs.trailing-whitespace-check.result }} |" >> $GITHUB_STEP_SUMMARY
